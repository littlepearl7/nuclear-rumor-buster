<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>核规联盟 · 科普互动平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
body {
    background: linear-gradient(160deg, #e0f2fe 0%, #bae6fd 30%, #7dd3fc 60%, #38bdf8 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
    gap: 20px;
}

/* ===== 侧边法规面板 ===== */
.side-panel {
    width: 340px; flex-shrink: 0;
    background: #fff; border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    display: flex; flex-direction: column; overflow: hidden;
    height: 780px;
}
.side-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; padding: 16px 20px; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
}
.side-header-right { margin-left: auto; font-size: 12px; opacity: 0.7; }
.side-content { flex: 1; overflow-y: auto; padding: 12px 16px; }
.side-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: #aaa;
    font-size: 13px; text-align: center; gap: 12px;
}
.side-empty-icon { font-size: 48px; opacity: 0.3; }
.law-card-side {
    background: #f0f4f8; border-left: 4px solid #667eea;
    padding: 12px 14px; border-radius: 12px; margin-bottom: 10px;
    font-size: 12px; color: #4a5568; animation: slideInRight 0.25s ease;
}
@keyframes slideInRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
.law-title-side { font-weight: bold; color: #667eea; margin-bottom: 6px; font-size: 13px; }
.law-desc-side { margin-bottom: 8px; line-height: 1.5; }
.law-article-side { margin-top: 6px; font-size: 11px; color: #555; line-height: 1.5; border-top: 1px dashed #d0d0d0; padding-top: 6px; }
.law-link-side { color: #667eea; text-decoration: underline; cursor: pointer; margin-top: 6px; font-size: 11px; display: block; }
.side-clear-btn {
    margin: 8px 16px 12px; background: #f0f4f8;
    border: 1px solid #e0e0e0; border-radius: 16px;
    padding: 8px; font-size: 12px; color: #888; cursor: pointer; text-align: center;
}
.side-clear-btn:hover { background: #e8eef5; }

/* ===== 手机 ===== */
.phone {
    max-width: 480px; width: 100%; height: 780px;
    background-color: #f5f5f5; border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 25px 80px -12px rgba(0,0,0,0.6), 0 0 0 8px #2a2a2a;
    display: flex; flex-direction: column; flex-shrink: 0;
}
.status-bar { background: #ededed; padding: 12px 20px 6px; display: flex; justify-content: space-between; font-size: 14px; font-weight: 500; color: #1f2e3a; }
.chat-header { background: #ededed; padding: 8px 16px 10px; border-bottom: 0.5px solid #dbdbdb; display: flex; align-items: center; gap: 12px; }
.back-btn { font-size: 24px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 20px; background: #e5e5e5; }
.group-name { font-weight: 600; font-size: 17px; }
.member-count { font-size: 12px; color: #6c6c6c; }
.more-icon { font-size: 20px; color: #6c6c6c; }
.chat-area { flex: 1; overflow-y: auto; padding: 16px 12px; background: linear-gradient(180deg, #e8f4f8 0%, #d4e8ed 100%); display: flex; flex-direction: column; gap: 10px; position: relative; }
.message { display: flex; gap: 10px; max-width: 85%; animation: fadeInUp 0.2s ease; }
.my-message { align-self: flex-end; flex-direction: row-reverse; }
.other-message { align-self: flex-start; }
.avatar { width: 40px; height: 40px; background: #cbdbe6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.my-avatar { background: #2c7da0; color: white; }
.bubble { background: white; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.05); word-break: break-word; white-space: pre-wrap; }
.my-message .bubble { background: #d9f0ec; border-bottom-right-radius: 4px; }
.other-message .bubble { border-bottom-left-radius: 4px; }
.other-message.negative .bubble { background: #fde8e8; border: 1px solid #f5c6c6; }
.other-message.positive .bubble { background: #edf7ed; border: 1px solid #c3e6cb; }
.other-message.neutral .bubble { background: #fff8e1; border: 1px solid #ffe082; }
.name-tag { font-size: 12px; color: #6c6c6c; margin-bottom: 4px; margin-left: 4px; }
.system-tip { text-align: center; font-size: 12px; color: #888; margin: 6px 0; }
.rumor-card { background: #fff3e0; border-left: 4px solid #f4a261; padding: 12px; border-radius: 16px; margin: 4px 0; font-size: 13px; }
.rumor-warning { font-weight: bold; color: #bc3900; }

/* ===== 底部栏 ===== */
.bottom-bar { background: #fff; border-top: 0.5px solid #dbdbdb; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

/* 单按钮辟谣流程 */
.step-hint { font-size: 11px; color: #888; margin-bottom: 2px; }
.main-action-btn {
    width: 100%; padding: 14px 20px; border: none; border-radius: 28px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: linear-gradient(135deg, #2c7da0, #1a936f);
    color: white; box-shadow: 0 4px 16px rgba(44,125,160,0.3);
    transition: transform 0.1s, box-shadow 0.15s, background 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
}
.main-action-btn:hover:not(.locked) { box-shadow: 0 6px 22px rgba(44,125,160,0.45); transform: translateY(-1px); }
.main-action-btn:active:not(.locked) { transform: scale(0.97); box-shadow: 0 2px 8px rgba(44,125,160,0.2); }
.main-action-btn.pulse:not(.locked) { animation: btnPulse 1.5s ease infinite; }
@keyframes btnPulse { 0%,100%{box-shadow:0 4px 16px rgba(44,125,160,0.3)} 50%{box-shadow:0 4px 28px rgba(44,125,160,0.55)} }
.main-action-btn.locked { background: #bbb !important; box-shadow: none; cursor: not-allowed; opacity: 0.65; }
.main-action-btn.locked:active { transform: none; }

/* 进度条 */
.progress-bar-row { display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 6px; }
.progress-pip { flex: 1; max-width: 60px; height: 6px; border-radius: 3px; background: #e0e0e0; transition: background 0.4s, transform 0.3s; }
.progress-pip.done { background: #1a936f; }
.progress-pip.active { background: linear-gradient(90deg, #f4a261, #e76f51); transform: scaleY(1.2); }
.progress-pip.locked { background: #e0e0e0; }

/* 一键辟谣 */
.cheat-row { display: flex; align-items: center; gap: 8px; }
.cheat-btn {
    flex: 1; padding: 9px; border: 1.5px dashed #ccc; border-radius: 20px;
    background: transparent; font-size: 12px; color: #aaa; cursor: pointer;
    text-align: center; transition: all 0.2s;
}
.cheat-btn:hover { border-color: #667eea; color: #667eea; background: #f8f4ff; }
.input-row { display: flex; gap: 8px; align-items: center; }
.input-field { flex: 1; background: #f5f5f5; border: none; padding: 9px 14px; border-radius: 28px; font-size: 14px; }
.send-btn { background: #2c7da0; border: none; color: white; padding: 7px 14px; border-radius: 28px; font-weight: 600; cursor: pointer; }
.footer-hint { font-size: 10px; text-align: center; color: #aaa; }

/* ============================================================ */
/* 入场动画：原子旋转 splash */
/* ============================================================ */
.nuclear-splash {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #0a2a3a 0%, #1a4a5a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s ease;
}
.nuclear-splash.fade-out {
    opacity: 0; visibility: hidden; pointer-events: none;
}
.atom-wrap {
    position: relative; width: 140px; height: 140px;
    animation: atomRotate 4s linear infinite;
}
.atom-core {
    position: absolute; top: 50%; left: 50%;
    width: 28px; height: 28px;
    background: radial-gradient(circle, #ffd700, #ff8c00);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px rgba(255,215,0,0.5);
}
.atom-orbit {
    position: absolute; inset: 0;
    border: 1.5px solid rgba(100,200,255,0.5);
    border-radius: 50%;
}
.atom-orbit:nth-child(2) { transform: rotate(60deg); }
.atom-orbit:nth-child(3) { transform: rotate(120deg); }
.electron {
    position: absolute; width: 10px; height: 10px;
    background: #4af; border-radius: 50%;
    top: -5px; left: 50%; transform: translateX(-50%);
    box-shadow: 0 0 6px #4af;
    animation: electronMove 3s linear infinite;
}
@keyframes atomRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
@keyframes electronMove {
    0% { top: -5px; left: 50%; }
    25% { top: 50%; left: calc(100% - 5px); }
    50% { top: calc(100% - 5px); left: 50%; }
    75% { top: 50%; left: -5px; }
    100% { top: -5px; left: 50%; }
}
.splash-tagline {
    margin-top: 30px; font-size: 30px; font-weight: bold; color: white;
    text-shadow: 0 0 12px rgba(0,160,255,0.6); letter-spacing: 4px;
}
.splash-mission {
    margin: 20px 36px 0;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 20px 24px;
    text-align: center;
    width: 440px; max-width: 92%;
    min-height: 120px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.splash-mission-label {
    font-size: 11px; color: rgba(255,255,255,0.4);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 10px;
}
.splash-mission-text {
    font-size: 15px; color: rgba(255,255,255,0.95);
    line-height: 1.8; letter-spacing: 0.5px;
}
.splash-pills { margin-top: 24px; display: flex; gap: 12px; }
.splash-pill {
    background: rgba(255,255,255,0.12); padding: 5px 16px; border-radius: 20px;
    font-size: 13px; color: rgba(255,255,255,0.85); letter-spacing: 1px;
}
.splash-footer { position: absolute; bottom: 20px; font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }

/* 检索和选择控制区 */
.splash-interactive-zone {
    margin-top: 24px; display: flex; flex-direction: column; gap: 14px; width: 340px; max-width: 90%;
    opacity: 0; transform: translateY(15px); transition: all 0.5s ease;
    pointer-events: none;
}
.splash-interactive-zone.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.rumor-selector-container { display: flex; flex-direction: column; gap: 8px; text-align: left; position: relative; }
.selector-title { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 500; padding-left: 4px; }

/* 现代防截断选择器样式 */
.rumor-selector {
    width: 100%; padding: 12px 16px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(15,35,55,0.85); color: #fff; font-size: 14px; outline: none; cursor: pointer;
    transition: all 0.25s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
}
.rumor-selector:hover, .rumor-selector:focus {
    border-color: #38bdf8; 
    background: rgba(12,42,66,0.98);
    box-shadow: 0 6px 24px rgba(56,189,248,0.25);
}
.rumor-selector option { background: #0e2433; color: #fff; padding: 10px; font-size: 13px; }

.splash-start-btn {
    width: 100%; padding: 13px; border: none; border-radius: 24px; font-size: 14px; font-weight: 600;
    color: white; background: linear-gradient(135deg, #10b981, #059669); cursor: pointer;
    box-shadow: 0 4px 16px rgba(16,185,129,0.35); transition: all 0.15s; text-align: center;
}
.splash-start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(16,185,129,0.5); }
.splash-start-btn:active { transform: scale(0.98); }

/* ============================================================ */
/* 结束动画：成就解锁 */
/* ============================================================ */
.new-challenge-btn {
    display: block; width: calc(100% - 16px); margin: 8px auto;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    border: none; padding: 12px 24px; border-radius: 28px;
    font-size: 14px; font-weight: 600; color: white;
    cursor: pointer; box-shadow: 0 4px 16px rgba(245,87,108,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
}
.new-challenge-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,87,108,0.45); }
.new-challenge-btn:active { transform: scale(0.97); }

/* ===== 选项弹窗 ===== */
.option-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.option-panel {
    background: #fff; border-radius: 24px; width: 92%; max-width: 440px;
    padding: 24px 20px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.25s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.option-title { font-size: 13px; color: #888; margin-bottom: 16px; text-align: center; }
.option-title strong { color: #333; font-size: 15px; }
.option-desc { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 16px; }
.option-item {
    background: #f8f9fa; border: 2px solid transparent;
    border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
    font-size: 13px; line-height: 1.5; cursor: pointer;
    transition: all 0.15s; text-align: left; width: 100%;
}
.option-item:last-child { margin-bottom: 0; }
.option-item:hover { border-color: #2c7da0; background: #eef7fa; transform: scale(1.01); }
.option-item:active { transform: scale(0.99); }
.option-item.correct { border-color: #1a936f !important; background: #e8f7f0 !important; animation: correctFlash 0.4s ease; }
.option-item.wrong { border-color: #e53e3e !important; background: #fff5f5 !important; }
@keyframes correctFlash { 0%{background:#fff} 30%{background:#b8f5d8} 100%{background:#e8f7f0} }

/* ===== Game Over ===== */
.gameover-mask {
    position: fixed; inset: 0; background: rgba(20,0,0,0.75);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 600; backdrop-filter: blur(8px);
    animation: fadeIn 0.3s ease;
}
.gameover-card {
    background: #fff; border-radius: 28px; padding: 36px 32px;
    text-align: center; max-width: 360px; width: 90%;
    animation: shake 0.5s ease;
}
@keyframes shake {
    0%,100%{transform:translateX(0)}
    15%{transform:translateX(-18px) rotate(-2deg)}
    30%{transform:translateX(18px) rotate(2deg)}
    45%{transform:translateX(-14px) rotate(-1deg)}
    60%{transform:translateX(14px) rotate(1deg)}
    75%{transform:translateX(-8px)}
    90%{transform:translateX(8px)}
}
.gameover-emoji { font-size: 56px; margin-bottom: 16px; display: block; }
.gameover-title { font-size: 22px; font-weight: bold; color: #c0392b; margin-bottom: 10px; }
.gameover-sub { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
.retry-btn {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white; border: none; padding: 14px 40px;
    border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 16px rgba(192,57,43,0.3);
    transition: transform 0.1s;
}
.retry-btn:active { transform: scale(0.96); }

/* ===== 内嵌法规提示 ===== */
.law-hint-card { background: #f8f4ff; border: 1px solid #d0c0ff; border-radius: 14px; padding: 10px 14px; font-size: 12px; color: #6b5fa0; margin: 4px 0; animation: fadeInUp 0.2s ease; display: flex; align-items: flex-start; gap: 8px; }
.law-hint-card .law-icon { font-size: 18px; flex-shrink: 0; }
.law-hint-card .law-text { line-height: 1.5; }
.law-hint-card .law-text strong { color: #667eea; }

/* ===== 通用动画 ===== */
@keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes fall { from{transform:translateY(0) rotate(0deg);opacity:1} to{transform:translateY(110vh) rotate(720deg);opacity:0} }
.badge-toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: #1f2e3ad9; backdrop-filter: blur(8px); color: gold; padding: 8px 16px; border-radius: 40px; font-size: 13px; z-index: 200; pointer-events: none; white-space: nowrap; animation: fadeIn 0.2s ease; }

/* Responsive */
@media (max-width: 900px) { .side-panel{display:none} body{justify-content:center} }
@media (max-width: 540px) { body{padding:0} .phone{max-width:100%;height:100vh;border-radius:0;box-shadow:none} }

/* ===== AI使用说明弹窗 ===== */
.ai-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 900; backdrop-filter: blur(5px);
    animation: fadeIn 0.25s ease;
}
.ai-modal-panel {
    background: #fff; border-radius: 24px; width: 92%; max-width: 480px;
    max-height: 80vh; overflow-y: auto;
    padding: 28px 24px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.3s ease; position: relative;
}
.ai-modal-close {
    position: absolute; top: 14px; right: 16px;
    width: 32px; height: 32px; border-radius: 50%;
    background: #f0f0f0; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #666; transition: all 0.15s;
}
.ai-modal-close:hover { background: #e0e0e0; color: #333; transform: scale(1.05); }
.ai-modal-title {
    font-size: 18px; font-weight: bold; color: #333;
    margin-bottom: 18px; padding-right: 36px;
    display: flex; align-items: center; gap: 8px;
}
.ai-modal-section {
    margin-bottom: 16px; padding: 14px 16px;
    background: #f8f9fa; border-radius: 14px;
}
.ai-modal-section:last-child { margin-bottom: 0; }
.ai-modal-section-title {
    font-size: 14px; font-weight: bold; color: #667eea;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.ai-modal-section p {
    font-size: 13px; color: #555; line-height: 1.7; margin: 0;
}
.ai-modal-footer {
    margin-top: 18px; text-align: center;
    font-size: 11px; color: #aaa; padding-top: 12px;
    border-top: 1px dashed #e0e0e0;
}
@media (max-width: 540px) {
    .ai-modal-panel { border-radius: 18px; padding: 22px 18px 18px; }
}
</style>
</head>
<body>

<!-- ===== 侧边法规面板 ===== -->
<div class="side-panel">
    <div class="side-header">
        <span>📜</span><span>法规知识库</span>
        <span class="side-header-right" id="lawCount">暂无</span>
    </div>
    <div class="side-content" id="sideContent">
        <div class="side-empty" id="sideEmpty">
            <div class="side-empty-icon">📋</div>
            <div>辟谣中用到的法律条文<br>将显示在这里</div>
        </div>
    </div>
    <div class="side-clear-btn" id="sideClearBtn" style="display:none;" onclick="clearSidePanel()">🗑️ 清空面板</div>
</div>

<!-- ===== 手机界面 ===== -->
<div class="phone">
    <div class="status-bar"><span>9:41</span><span>📶 🔋 100%</span></div>
    <div class="chat-header">
        <div class="back-btn">←</div>
        <div style="flex:1">
            <div class="group-name">⚖️ 核你讲法规 ⚖️</div>
            <div class="member-count" id="memberCount">群成员 8人 · 核规联盟 在线</div>
        </div>
        <div class="more-icon">⋯</div>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="system-tip" id="welcomeTip">✨ 核规联盟已接入 · 科学守护日常 ✨</div>
        <div class="rumor-card" id="rumorHint">
            ⚠️ <span class="rumor-warning">当前谣言</span>：<br>
            <div style="margin-top:6px;padding:8px;background:#fff;border-radius:8px;">
                📢 <strong id="rumorTitle">等待谣言出现...</strong><br>
                <span style="color:#888;font-size:11px;" id="rumorSender">— 等待中</span>
            </div>
        </div>
    </div>
    <!-- 底部栏：单按钮 + 一键辟谣 + 输入框 -->
    <div class="bottom-bar" id="bottomBar">
        <!-- 进度小点 -->
        <div class="progress-bar-row" id="progressPips" style="justify-content:center;gap:6px;margin-bottom:2px;">
            <div class="progress-pip" id="pip0"></div>
            <div class="progress-pip" id="pip1"></div>
            <div class="progress-pip" id="pip2"></div>
            <div class="progress-pip" id="pip3"></div>
        </div>
        <!-- 主按钮 -->

function playSend(){const c=initAudio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(600,c.currentTime);o.frequency.setValueAtTime(900,c.currentTime+0.05);o.type='sine';g.gain.setValueAtTime(0.2,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.15);o.start();o.stop(c.currentTime+0.15);}

function updatePips(){
    for(let i=0;i<4;i++){
        const pip=document.getElementById('pip'+i);
        if(!pip)continue;
        pip.className='progress-pip';
        if(i<currentStage)pip.classList.add('done');
        else if(i===currentStage && gameActive)pip.classList.add('active');
        else pip.classList.add('locked');
    }
}

// 主按钮状态更新
// ============================================================
function updateMainBtn(){
    if(!gameActive && !gameFinished){mainBtnText.textContent='等待新挑战...';mainBtnIcon.textContent='🎯';mainActionBtn.classList.remove('pulse');mainActionBtn.classList.add('locked');return;}
    if(gameFinished){mainBtnText.textContent='辟谣完成！';mainBtnIcon.textContent='✅';mainActionBtn.classList.remove('pulse');mainActionBtn.classList.add('locked');return;}
    if(currentStage>=4){mainBtnText.textContent='辟谣完成！';mainBtnIcon.textContent='✅';mainActionBtn.classList.remove('pulse');mainActionBtn.classList.add('locked');return;}
    const stage=currentRumor.stages[currentStage];
    mainBtnText.textContent=stage.btnText;
    mainBtnIcon.textContent=stage.btnIcon;
    mainActionBtn.classList.remove('locked');
    mainActionBtn.classList.add('pulse');
}

function handleOption(btn, optIdx){
    const isCorrect=btn.dataset.correct==='true';
    btn.parentElement.querySelectorAll('.option-item').forEach(b=>b.style.pointerEvents='none');
    if(isCorrect){
        btn.classList.add('correct');
        schedule(()=>{optionPopup.style.display='none';optionPopup.innerHTML='';handleCorrectAnswer();},500);
    } else {
        btn.classList.add('wrong');
        playWrong();
        const opt=currentRumor.stages[currentStage].options[optIdx];
        // 在选项卡底部追加错误解析区
        const panel=btn.closest('.option-panel');
        if(panel){
            const reasonDiv=document.createElement('div');
            reasonDiv.style.cssText='background:#fff3e0;border-radius:12px;padding:14px;margin-top:14px;border-left:3px solid #e07b00';
            reasonDiv.innerHTML='<div style="font-size:11px;color:#e07b00;font-weight:bold;margin-bottom:6px">✖ 错在哪里</div>'+
                '<div style="font-size:13px;color:#555;line-height:1.6">'+opt.whyWrong+'</div>';
            panel.appendChild(reasonDiv);
            // 重选本题按钮
            const retryBtn=document.createElement('button');
            retryBtn.style.cssText='display:block;width:100%;background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:white;padding:13px 0;border-radius:30px;font-weight:bold;font-size:14px;cursor:pointer;box-shadow:0 4px 12px rgba(102,126,234,0.35);margin-top:14px';
            retryBtn.textContent='↩️ 重选本题';
            retryBtn.onclick=()=>{
                showQuestion();
            };
            panel.appendChild(retryBtn);
        }
    }
}

function showQuestion(){
    // 进入下一题时，清理上一题遗留的 tips、事实摘要等中间状态
    chatArea.querySelectorAll('.system-tip,.fact-summary,.src-card').forEach(el=>el.remove());
    const stage=currentRumor.stages[currentStage];
    if(!stage || !stage.options) return;
    const opts=stage.options;
    let html=
        '<div class="option-panel">'+
        '<div class="option-title"><strong>'+stage.btnText.replace(/^[^\s]+\s/,'')+'</strong><br><span style="color:#888;font-size:12px;">请选择你认为最合适的回复方式</span></div>'+
        '<div class="option-desc">选错会导致科普失败 ⚠️</div>';

// ============================================================
// 答对处理
// ============================================================
function handleCorrectAnswer(){
    const stage=currentRumor.stages[currentStage];
    playDebunk();
    // 发送第一段（选中的回答内容）
    addMsg('me','核规志愿者·小原',stage.brief,'👨‍🔬');
    // 发送第二段（详细补充，400ms后）
    if(stage.detail){
        schedule(()=>{
            if(!gameActive)return;
            addMsg('me','核规志愿者·小原',stage.detail,'👨‍🔬');
        },400);
    }
    // 发送科普来源卡片（300ms），蓝色内嵌独立卡片，可点击跳转
    if(stage.src){
        schedule(()=>{
            const srcData=LAWS_DB[stage.src];
            if(!srcData||!srcData.link)return;
            const card=document.createElement('div');card.className='src-card';
            card.style.cssText='background:#edf2ff;border-radius:14px;padding:12px 14px;margin:6px 0;border-left:3px solid #667eea;cursor:pointer;font-size:12px;color:#555;display:flex;align-items:center;gap:8px;transition:background 0.15s';
            card.innerHTML='<span style="font-size:16px;">📎</span><span style="flex:1"><span style="color:#333;font-weight:bold">科普来源</span><br><span style="font-size:11px;color:#667eea">'+srcData.title+'</span></span><span style="font-size:13px;color:#667eea">→</span>';
            card.onclick=()=>window.open(srcData.link,'_blank');
            card.onmouseenter=()=>card.style.background='#e0e5ff';
            card.onmouseleave=()=>card.style.background='#edf2ff';
            chatArea.appendChild(card);chatArea.scrollTop=chatArea.scrollHeight;
        },300);
    }
    // 发送事实摘要（400ms）
    schedule(()=>{
        const c=document.createElement('div');c.className='fact-summary';
        c.style.cssText='background:#e0f2e9;padding:10px 12px;border-radius:12px;font-size:13px;margin:6px 0;border-left:3px solid #1a936f';
        c.textContent=stage.fact;
        chatArea.appendChild(c);chatArea.scrollTop=chatArea.scrollHeight;
    },400);
    // 推送法规到右侧面板（如有）
    if(stage.law){
        addToSidePanel(stage.law);
    }

    // =============================================
    // 所有消息 schedule 完成后，再推进步骤和 UI
    // =============================================
    const isLastStage=(currentStage===3);
    const lastMsgDelay=isLastStage?900:300; // 最后一步等科普来源卡；中间步骤等事实摘要

    schedule(()=>{
        if(!gameActive)return;
        currentStage++;
        updatePips();
        updateMainBtn();
        if(currentStage>=4){
            completeDebunk();
        } else {
            if(stage.followUp){
                scheduleFollowUp(stage.followUp);
            }
            addTip('💪 辟谣进度 '+(currentStage)+'/4！继续下一步~','#2c7da0');
            showToast('🔬 +1 科学影响力');
        }
    },lastMsgDelay+200);
}

function scheduleFollowUp(fu){
    if(followUpTimeout)clearTimeout(followUpTimeout);
    followUpTimeout=schedule(()=>{
        if(!gameActive||currentStage>=4)return;
        playFollowUp();
        addMsg('other',fu.s,fu.t,AVATAR_MAP[fu.s]||'👤','neutral');
    },4500);
}

function typeEngine(target, content, pace, next) {
    let cursor = 0;
    function action() {
        if (cursor < content.length) {
            target.innerHTML += content.charAt(cursor);
            cursor++;
            setTimeout(action, pace);
        } else if (next) {
            next();
        }
    }
    action();
}

function drawCertCanvas(canvas,allDone,totalBadgesShown,dateStr){
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // 背景
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,'#f5f7ff');
    grad.addColorStop(0.5,'#fff8f0');
    grad.addColorStop(1,'#f0f5ff');
    ctx.fillStyle=grad;
    roundRect(ctx,0,0,W,H,20);
    ctx.fill();

    // 边框
    ctx.strokeStyle='#c4b5fd';
    ctx.lineWidth=3;
    roundRect(ctx,20,20,W-40,H-40,16);
    ctx.stroke();
    ctx.strokeStyle='#ddd6fe';
    ctx.lineWidth=1.5;
    roundRect(ctx,28,28,W-56,H-56,12);
    ctx.stroke();

    // 顶部装饰线
    ctx.strokeStyle='#818cf8';
    ctx.lineWidth=1;
    ctx.setLineDash([6,4]);
    ctx.beginPath();
    ctx.moveTo(100,80);ctx.lineTo(W-100,80);
    ctx.stroke();
    ctx.setLineDash([]);

    // 标题
    ctx.fillStyle='#4338ca';
    ctx.font='bold 14px "Microsoft YaHei",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('核规联盟 · 科普成就证书',W/2,72);

    // 主标题
    ctx.fillStyle='#1e1b4b';
    ctx.font='bold 42px "Microsoft YaHei",sans-serif';
    ctx.fillText(allDone?'核+X 科普先锋':'理性辨谣达人',W/2,148);

    // 副标题
    ctx.fillStyle='#6b7280';
    ctx.font='16px "Microsoft YaHei",sans-serif';
    ctx.fillText('用科学击破谣言 · 用理性守护日常',W/2,178);

    // 分隔线
    ctx.strokeStyle='#e0e7ff';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(160,198);ctx.lineTo(W-160,198);
    ctx.stroke();

    // 里程碑图标
    const icons=['🌾','🧂','⚛️','🏥'];
    const iconsDone=[totalBadgesShown>=1,totalBadgesShown>=2,totalBadgesShown>=3,totalBadgesShown>=4];
    const spacing=80;
    const startX=W/2-spacing*1.5;
    icons.forEach((ic,i)=>{
        const x=startX+i*spacing;
        const done=iconsDone[i];
        ctx.beginPath();
        ctx.arc(x,250,done?22:20,0,Math.PI*2);
        ctx.fillStyle=done?'linear-gradient(#f093fb,#f5576c)':(i%2===0?'#f3f4f6':'#f9fafb');
        if(done){
            const g=ctx.createRadialGradient(x,250,0,x,250,22);
            g.addColorStop(0,'#fda4af');g.addColorStop(1,'#f43f5e');
            ctx.fillStyle=g;
        } else {
            ctx.fillStyle='#e5e7eb';
        }
        ctx.fill();
        if(done){
            ctx.shadowColor='rgba(244,63,94,0.4)';
            ctx.shadowBlur=8;
            ctx.fill();
            ctx.shadowBlur=0;
        }
        ctx.strokeStyle=done?'#fda4af':'#d1d5db';
        ctx.lineWidth=2;
        ctx.stroke();
        ctx.fillStyle=done?'#fff':'#9ca3af';
        ctx.font=done?'22px Arial':'20px Arial';
        ctx.textAlign='center';
        ctx.fillText(ic,x,257);
    });

    // 统计
    ctx.fillStyle='#374151';
    ctx.font='bold 14px "Microsoft YaHei",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('辟谣完成 '+totalBadgesShown+' / '+RUMORS.length+' 个谣言类型',W/2,305);

    ctx.fillStyle='#6b7280';
    ctx.font='13px "Microsoft YaHei",sans-serif';
    ctx.fillText('完成 4 个辟谣步骤（查官方通报→讲科学原理→亮法规支撑→我们该怎么做）',W/2,330);

    // 底部日期
    ctx.fillStyle='#9ca3af';
    ctx.font='12px "Microsoft YaHei",sans-serif';
    ctx.fillText(dateStr,W/2,H-60);
    ctx.fillText('核规联盟 科普平台',W/2,H-42);

    // 装饰角
    ctx.fillStyle='#818cf8';
    ctx.font='28px Arial';
    ctx.textAlign='left';
    ctx.fillText('✦',36,H-30);
    ctx.textAlign='right';
    ctx.fillText('✦',W-36,H-30);
}

function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

    selectNewRumor();
    rumorHint.innerHTML=
        '⚠️ <span class="rumor-warning">当前谣言</span>：<br>'+
        '<div style="margin-top:6px;padding:8px;background:#fff;border-radius:8px;">'+
        '📢 <strong>'+currentRumor.title+'</strong><br>'+
        '<span style="color:#888;font-size:11px;">— '+currentRumor.sender+'</span></div>';
    memberCount.textContent=currentRumor.groupName||'群成员 8人 · 核规联盟 在线';
    gameActive=true;
    updatePips();
    updateMainBtn();
    triggerRumor();
}

// ============================================================
// 完成辟谣
// ============================================================
function completeDebunk(){
    gameActive=false;
    gameFinished=true;
    totalBadges++;
    completedRumorIds.add(currentRumor.id);
    const escapedTitle=currentRumor.title.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    rumorHint.innerHTML='✅ <strong>辟谣完成！</strong><br>'+escapedTitle+' 已被科学澄清！<br>🏅 累计获得理性辨谣徽章 ×'+totalBadges;
    rumorHint.style.borderLeftColor='#1a936f';
    rumorHint.style.background='#dff0ea';
    updateMainBtn();
    showToast('🏅 获得徽章！总计 '+totalBadges+' 个');
    playBadge();
    const fb=currentRumor.feedback[Math.floor(Math.random()*currentRumor.feedback.length)];
    const delays=[800,1600,2400];
    fb.chars.forEach((ch,i)=>{
        if(i<delays.length){
            schedule(()=>{
                addMsg('other',ch.n,ch.msgs[Math.floor(Math.random()*ch.msgs.length)],ch.a,'positive');
            },delays[i]);
        }
    });
    const lastDelay=delays[Math.min(fb.chars.length-1,2)];

    const allDone=completedRumorIds.size>=RUMORS.length;

    if(allDone){
        schedule(()=>addTip('🎉 全部谣言辟谣完毕！成就解锁中...','#1a936f'),lastDelay+500);
        schedule(()=>showAchievement(),lastDelay+2200);
    } else {
        schedule(()=>addTip('🎉 科普成功！累计获得 🏅×'+totalBadges,'#1a936f'),lastDelay+500);
        schedule(()=>{
            const btn=document.createElement('button');
            btn.className='new-challenge-btn';btn.style.cssText='display:block;margin:8px auto;';
            btn.textContent='🎯 新挑战：下一个谣言';
            btn.onclick=()=>{playClick();startNewChallenge();};
            chatArea.appendChild(btn);chatArea.scrollTop=chatArea.scrollHeight;
        },lastDelay+1500);
    }
}

// ============================================================
// Game Over
// ============================================================
function showGameOver(){
    gameActive=false;
    gameFinished=true;
    rumorHint.innerHTML='❌ <strong>科普失败！</strong><br>大爷大妈不信科普，退群了……<br>🏅 累计获得理性辨谣徽章 ×'+totalBadges;
    rumorHint.style.borderLeftColor='#c0392b';
    rumorHint.style.background='#ffe0e0';
    updateMainBtn();
    if(followUpTimeout)clearTimeout(followUpTimeout);
    gameoverPopup.innerHTML=
        '<div class="gameover-mask">'+
        '<div class="gameover-card">'+
        '<span class="gameover-emoji">😢</span>'+
        '<div class="gameover-title">科普方式不当</div>'+
        '<div class="gameover-sub">大爷大妈不信科普内容，觉得敷衍/不专业，<br>一气之下退出群聊了……<br><br>💡 提示：选择最专业、最硬核的回答方式，<br>才能让大爷大妈真正信服！</div>'+
        '<button class="retry-btn" onclick="retryChallenge()">🔄 重新挑战</button>'+
        '</div></div>';
    gameoverPopup.style.display='block';
}

function retryChallenge(){
    playClick();
    gameoverPopup.style.display='none';
    gameoverPopup.innerHTML='';
    resetAndRestart();
}

// ============================================================
// 重置并重启（同一谣言）
// ============================================================
function resetAndRestart(){
    gameActive=false;
    gameFinished=false;
    if(followUpTimeout)clearTimeout(followUpTimeout);followUpTimeout=null;
    currentStage=0;
    const msgs=chatArea.querySelectorAll('.message,.law-hint-card,.new-challenge-btn,.src-card,.fact-summary');
    msgs.forEach(m=>m.remove());
    rumorHint.innerHTML=
        '⚠️ <span class="rumor-warning">当前谣言</span>：<br>'+
        '<div style="margin-top:6px;padding:8px;background:#fff;border-radius:8px;">'+
        '📢 <strong>'+currentRumor.title+'</strong><br>'+
        '<span style="color:#888;font-size:11px;">— '+currentRumor.sender+'</span></div>';
    rumorHint.style.borderLeftColor='#f4a261';
    rumorHint.style.background='#fff3e0';
    memberCount.textContent=currentRumor.groupName||'群成员 8人 · 核规联盟 在线';
    gameActive=true;
    updatePips();
    updateMainBtn();
    triggerRumor();
}

// ============================================================
// 开始新挑战
// ============================================================
function startNewChallenge(){
    gameActive=false; // 先禁掉，防止旧谣言pending回调在新谣言里乱跑
    gameFinished=false; // 重置完成标记
    clearAllPending();
    currentStage=0;
    const items=chatArea.querySelectorAll('.message,.law-hint-card,.system-tip,.new-challenge-btn,.src-card,.fact-summary');
    items.forEach(m=>m.remove());
    optionPopup.style.display='none';
    optionPopup.innerHTML='';
    welcomeTip.style.display='none';
    selectNewRumor();
    rumorHint.innerHTML=
        '⚠️ <span class="rumor-warning">当前谣言</span>：<br>'+
        '<div style="margin-top:6px;padding:8px;background:#fff;border-radius:8px;">'+
        '📢 <strong>'+currentRumor.title+'</strong><br>'+
        '<span style="color:#888;font-size:11px;">— '+currentRumor.sender+'</span></div>';
    rumorHint.style.borderLeftColor='#f4a261';
    rumorHint.style.background='#fff3e0';
    memberCount.textContent=currentRumor.groupName||'群成员 8人 · 核规联盟 在线';
    gameActive=true;
    updatePips();
    updateMainBtn();
    schedule(()=>triggerRumor(),300);
}

// ============================================================
// 一键辟谣（跳过答题）
// ============================================================
function skipToFinish(){
    playClick();
    if(!gameActive){addTip('✅ 当前无活跃谣言','#888');return;}
    // 清空所有stages的答题进度
    currentStage=4;
    updatePips();
    updateMainBtn();
    if(followUpTimeout)clearTimeout(followUpTimeout);
    // 依次快速发送所有回复
    let delay=300;
    currentRumor.stages.forEach((stage,i)=>{
        schedule(()=>{
            addMsg('me','核规志愿者·小原',stage.brief,'👨‍🔬');
            if(stage.detail){
                schedule(()=>{
                    addMsg('me','核规志愿者·小原',stage.detail,'👨‍🔬');
                },400);
            }
            if(stage.law){schedule(()=>{addToSidePanel(stage.law);},200);}
            if(stage.src){
                schedule(()=>{
                    const srcData=LAWS_DB[stage.src];
                    if(!srcData||!srcData.link)return;
                    const card=document.createElement('div');card.className='src-card';
                    card.style.cssText='background:#edf2ff;border-radius:14px;padding:12px 14px;margin:6px 0;border-left:3px solid #667eea;cursor:pointer;font-size:12px;color:#555;display:flex;align-items:center;gap:8px;transition:background 0.15s';
                    card.innerHTML='<span style="font-size:16px;">📎</span><span style="flex:1"><span style="color:#333;font-weight:bold">科普来源</span><br><span style="font-size:11px;color:#667eea">'+srcData.title+'</span></span><span style="font-size:13px;color:#667eea">→</span>';
                    card.onclick=()=>window.open(srcData.link,'_blank');
                    card.onmouseenter=()=>card.style.background='#e0e5ff';
                    card.onmouseleave=()=>card.style.background='#edf2ff';
                    chatArea.appendChild(card);chatArea.scrollTop=chatArea.scrollHeight;
                },250);
            }
        },delay);
        delay+=1800;
    });
    // 完成
    schedule(()=>completeDebunk(),delay+500);
}

// ============================================================
// 触发谣言（仅一次）
// ============================================================
function triggerRumor(){
    // 先清掉旧tips，避免切换谣言时残留
    chatArea.querySelectorAll('.system-tip').forEach(t=>t.remove());

    currentRumor.intro.forEach((msg,i)=>{
        schedule(()=>{
            if(!gameActive)return;
            addMsg('other',msg.s,msg.t,AVATAR_MAP[msg.s]||'👤','negative');
        },i*900);
    });
    schedule(()=>{
        if(!gameActive)return;
        addTip('⚠️ 群里出现新谣言了！"'+currentRumor.title+'"','#bc3900');
        showQuestion();
    },currentRumor.intro.length*900);
}

function initializeRumorDisplay(){
    rumorHint.innerHTML=
        '⚠️ <span class="rumor-warning">当前谣言</span>：<br>'+
        '<div style="margin-top:6px;padding:8px;background:#fff;border-radius:8px;">'+
        '📢 <strong>'+currentRumor.title+'</strong><br>'+
        '<span style="color:#888;font-size:11px;">— '+currentRumor.sender+'</span></div>';
    rumorHint.style.borderLeftColor='#f4a261';
    rumorHint.style.background='#fff3e0';
    memberCount.textContent=currentRumor.groupName||'群成员 8人 · 核规联盟 在线';
    gameActive=true;
    updatePips();
    updateMainBtn();
    schedule(()=>triggerRumor(),300);
}

function initializeMainChatFlow() {
    if (selectedRumorIdFromSplash !== 'random') {
        const found = RUMORS.find(r => r.id === selectedRumorIdFromSplash);
        if (found) {
            currentRumor = found;
            let findIdx = RUMORS.findIndex(r => r.id === selectedRumorIdFromSplash);
            if (findIdx !== -1) usedRumorIndices.add(findIdx);
        } else {
            selectNewRumor();
        }
    } else {
        selectNewRumor();
    }
    initializeRumorDisplay();
}

// ============================================================
// 选择新谣言
// ============================================================
function selectNewRumor(){
    if(usedRumorIndices.size>=RUMORS.length)usedRumorIndices.clear();
    const available=[];
    for(let i=0;i<RUMORS.length;i++)if(!usedRumorIndices.has(i))available.push(i);
    const idx=available[Math.floor(Math.random()*available.length)];
    usedRumorIndices.add(idx);
    currentRumor=RUMORS[idx];
}

// ============================================================
// 发送消息
// ============================================================
function sendMsg(){
    const input=document.getElementById('messageInput');
    const text=input.value.trim();
    if(!text)return;
    playSend();
    addMsg('me','核规志愿者·小原',text,'👨‍🔬');
    input.value='';
}

// ============================================================
// 事件绑定
// ============================================================
document.getElementById('sendBtn').addEventListener('click',sendMsg);
document.getElementById('messageInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendMsg();});
document.addEventListener('click',()=>initAudio(),{once:true});

showNuclearSplash();
